<!DOCTYPE html>
<html lang="zh-CN" data-theme="qq-light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent资料设置</title>
<style>
  /* ===== QQ Color Tokens (qq-light) ===== */
  [data-theme="qq-light"] {
    --brand_standard: #0099FF;
    --brand_light: rgba(0,153,255,0.2);
    --brand_pressed: #008ae5;
    --text_primary: rgba(0, 0, 0, 0.90);
    --text_primary_light: rgba(60, 60, 67, 0.76);
    --text_secondary: rgba(60, 60, 67, 0.56);
    --text_tertiary: rgba(60, 60, 67, 0.36);
    --text_link: #214CA5;
    --text_allwhite_primary: #FFFFFF;
    --fill_standard_primary: rgba(13, 16, 49, 0.04);
    --fill_standard_secondary: rgba(0, 0, 0, 0.10);
    --fill_pressed: rgba(0, 0, 0, 0.04);
    --bg_bottom_light: #FFFFFF;
    --bg_bottom_standard: #F0F0F2;
    --bg_middle_standard: #F0F0F2;
    --bg_item: #FFFFFF;
    --border_standard: rgba(60, 60, 67, 0.25);
    --border_light: rgba(0, 0, 0, 0.05);
    --separator: rgba(0, 0, 0, 0.05);
    --color_feedback_error: #F74C30;
  }

  /* ===== Global Tokens ===== */
  :root {
    --device-width: 428px;
    --device-screen-height: 926px;
    --device-status-bar-height: 54px;
    --device-home-bar-height: 34px;
    --device-home-bar-indicator-width: 144px;
    --device-home-bar-indicator-height: 5px;
    --device-home-bar-indicator-radius: 2.5px;
    --spacing-page-padding: 16px;
    --spacing-icon-gap: 12px;
    --spacing-section-gap: 8px;
    --spacing-grid-unit: 4px;
    --spacing-b1: 4px;
    --spacing-b2: 8px;
    --spacing-b3: 12px;
    --spacing-b4: 16px;
    --spacing-b5: 24px;
    --spacing-b6: 32px;
    --radius-input: 12px;
    --typo-headline-size: 17px;
    --typo-headline-weight: 600;
    --typo-headline-line: 24px;
    --typo-body-size: 17px;
    --typo-body-weight: 400;
    --typo-body-line: 24px;
    --typo-footnote-size: 14px;
    --typo-footnote-weight: 400;
    --typo-footnote-line: 20px;
    --typo-caption1-size: 12px;
    --typo-caption1-weight: 400;
    --typo-caption1-line: 17px;
    --anim-press-in-duration: 100ms;
    --anim-press-in-easing: ease-out;
    --anim-press-out-duration: 150ms;
    --anim-press-out-easing: ease-out;
  }

  /* ===== Reset ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: "PingFang SC", -apple-system, "Helvetica Neue", sans-serif;
    width: var(--device-width);
    height: var(--device-screen-height);
    margin: 0 auto;
    background: var(--bg_bottom_standard);
    overflow: hidden;
    position: relative;
  }

  /* ===== StatusBar (428×54) ===== */
  .status-bar {
    width: var(--device-width); height: var(--device-status-bar-height);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 var(--spacing-page-padding);
    background: var(--bg_bottom_light); position: relative; z-index: 20;
  }
  .status-bar-time {
    font-family: "SF Pro Display", -apple-system, sans-serif;
    font-size: 17px; font-weight: 600; color: var(--text_primary);
    padding-left: 12px; padding-top: 12px;
  }
  .status-bar-icons { display: flex; align-items: center; gap: 4px; padding-top: 12px; padding-right: 4px; }
  .status-bar-icons img { display: block; }

  /* ===== NavBar (428×44) ===== */
  .navbar-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 var(--spacing-page-padding); width: var(--device-width); height: 44px;
    background: var(--bg_bottom_light); position: sticky; top: 0; z-index: 10;
  }
  .navbar-left { min-width: 60px; display: flex; align-items: center; }
  .navbar-left img { width: 24px; height: 24px; cursor: pointer; }
  .navbar-center {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 17px; font-weight: 600; color: var(--text_primary); white-space: nowrap;
  }
  .navbar-right { min-width: 60px; display: flex; align-items: center; justify-content: flex-end; }
  .navbar-right .action-text {
    font-size: 17px; font-weight: 400; color: var(--text_primary); cursor: pointer;
    transition: opacity var(--anim-press-in-duration) var(--anim-press-in-easing);
  }
  .navbar-right .action-text:active { opacity: 0.5; }

  /* ===== Content Area ===== */
  .content-area {
    width: var(--device-width);
    height: calc(var(--device-screen-height) - var(--device-status-bar-height) - 44px - var(--device-home-bar-height));
    overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: var(--spacing-b6);
  }
  .content-area::-webkit-scrollbar { display: none; }

  /* ===== Grouped List ===== */
  .form-group {
    background: var(--bg_middle_standard); padding: 0;
    width: var(--device-width); display: flex; flex-direction: column;
  }
  .form-group-header {
    padding: var(--spacing-b3) var(--spacing-b6) var(--spacing-b2);
    font-size: var(--typo-footnote-size); font-weight: var(--typo-footnote-weight);
    line-height: var(--typo-footnote-line); color: var(--text_secondary);
  }
  .form-group-content {
    background: var(--bg_bottom_light); margin: 0 var(--spacing-page-padding);
    border-radius: 12px; overflow: hidden; width: 396px;
  }

  /* ===== Textfield B 类 (有标题型, 56px 行) ===== */
  .tf-row {
    display: flex; align-items: center;
    padding: 0 var(--spacing-page-padding); height: 56px;
    background: transparent; position: relative;
  }
  .tf-row .tf-title {
    font-size: var(--typo-body-size); font-weight: var(--typo-body-weight);
    color: var(--text_primary); width: 90px; flex-shrink: 0;
  }
  .tf-row .tf-gap { width: 24px; flex-shrink: 0; }
  .tf-row .tf-input-wrap {
    flex: 1; min-width: 0; display: flex; align-items: center; gap: var(--spacing-b2);
  }
  .tf-row .tf-input {
    flex: 1; min-width: 0; border: none; outline: none;
    font-size: var(--typo-body-size); font-weight: var(--typo-body-weight);
    line-height: var(--typo-body-line); color: var(--text_primary);
    background: transparent; font-family: inherit;
    caret-color: var(--brand_standard);
  }
  .tf-row .tf-input::placeholder { color: rgba(60, 60, 67, 0.26); }

  /* 清除按钮 (20×20, 仅输入态/错误态显示) */
  .tf-clear {
    width: 20px; height: 20px; flex-shrink: 0; cursor: pointer;
    display: none; opacity: 0.56;
  }
  .tf-clear.visible { display: block; }

  /* B 类附加说明行 (字数统计, SPEC 11.4: 14px, 24px高, 右对齐) */
  .tf-row-footer {
    display: flex; justify-content: flex-end;
    padding: 0 var(--spacing-page-padding); height: 24px; align-items: center;
  }
  .tf-row-counter {
    font-size: var(--typo-footnote-size); font-weight: var(--typo-footnote-weight);
    line-height: var(--typo-footnote-line); color: var(--text_secondary);
  }
  .tf-row-counter.error { color: var(--color_feedback_error); }

  /* ===== Textfield D 类 (多行文本域, SPEC 5.4: 396×197px 圆角容器) ===== */
  .tf-multiline {
    background: var(--bg_bottom_light); margin: 0 var(--spacing-page-padding);
    border-radius: var(--radius-input); width: 396px; height: 197px;
    padding: var(--spacing-page-padding); position: relative;
  }
  .tf-textarea-wrap { position: relative; width: 100%; height: 144px; }
  .tf-multiline textarea {
    width: 100%; height: 144px; border: none; outline: none;
    font-size: var(--typo-body-size); font-weight: var(--typo-body-weight);
    line-height: var(--typo-body-line); color: var(--text_primary);
    background: transparent; font-family: inherit; resize: none;
    caret-color: var(--brand_standard);
  }
  .tf-multiline textarea::placeholder { color: rgba(60, 60, 67, 0.26); }
  .tf-counter {
    position: absolute; right: var(--spacing-page-padding); bottom: var(--spacing-page-padding);
    font-size: var(--typo-caption1-size); font-weight: var(--typo-caption1-weight);
    line-height: var(--typo-caption1-line); color: var(--text_secondary);
  }
  .tf-counter.error { color: var(--color_feedback_error); }

  /* ===== Separator (Textfield 卡片内: SPEC 6.2 --border_standard) ===== */
  .form-separator {
    height: 0.5px; background: var(--border_standard);
    margin-left: var(--spacing-page-padding); margin-right: var(--spacing-page-padding);
  }

  /* ===== Home Bar ===== */
  .home-bar {
    position: absolute; bottom: 0; left: 0; width: var(--device-width);
    height: var(--device-home-bar-height); display: flex; align-items: flex-end;
    justify-content: center; padding-bottom: 8px; z-index: 30;
    background: var(--bg_bottom_standard);
  }
  .home-bar-indicator {
    width: var(--device-home-bar-indicator-width);
    height: var(--device-home-bar-indicator-height);
    border-radius: var(--device-home-bar-indicator-radius);
    background: rgba(0, 0, 0, 0.90);
  }
</style>
</head>

<script>
/**
 * Textfield 交互状态机 (SPEC 9.1)
 * ─────────────────────────────────
 * 默认态(1) →(focus)→ 激活态(2)
 * 激活态(2) →(input)→ 输入态(3)
 * 输入态(3) →(blur) → 完成态(4)
 * 输入态(3) →(超限) → 错误态(5)
 * 完成态(4) →(focus)→ 激活态/输入态
 * 错误态(5) →(删减)→ 输入态(3)
 *
 * 清除按钮: 仅输入态(3)和错误态(5)显示 (SPEC 9.3)
 * 字数统计: 默认/激活态 "N字", 输入/完成/错误态 "已输入/N字" (SPEC 9.2)
 * 错误态: 字数超限时计数器变红 #F74C30 (SPEC 13)
 * 光标: 品牌蓝 #0099FF, caret-color (SPEC 8.1)
 * placeholder: rgba(60,60,67,0.26) (SPEC 3)
 */

// ===== B 类单行输入框 =====
function setupBField(inputId, clearBtnId, counterId, maxLen) {
  var input = document.getElementById(inputId);
  var clearBtn = document.getElementById(clearBtnId);
  var counter = document.getElementById(counterId);

  function refresh() {
    var len = input.value.length;
    var focused = (document.activeElement === input);
    var hasValue = len > 0;
    var overLimit = len > maxLen;

    // 清除按钮: 聚焦 + 有内容时显示 (输入态/错误态)
    if (focused && hasValue) {
      clearBtn.classList.add('visible');
    } else {
      clearBtn.classList.remove('visible');
    }

    // 字数统计格式
    if (hasValue) {
      // 输入态/完成态/错误态 → "已输入/N字"
      counter.textContent = len + '/' + maxLen + '字';
    } else {
      // 默认态/激活态 → "N字"
      counter.textContent = maxLen + '字';
    }

    // 错误态: 超限时计数器变红
    if (overLimit) {
      counter.classList.add('error');
    } else {
      counter.classList.remove('error');
    }
  }

  input.addEventListener('focus', refresh);
  input.addEventListener('blur', function() {
    setTimeout(refresh, 0);
  });
  input.addEventListener('input', refresh);

  // 清除按钮: mousedown 阻止 blur，再清空内容 → 回到激活态 (SPEC 9.3)
  clearBtn.addEventListener('mousedown', function(e) { e.preventDefault(); });
  clearBtn.addEventListener('touchstart', function(e) { e.preventDefault(); });
  clearBtn.addEventListener('click', function() {
    input.value = '';
    input.focus();
    refresh();
  });

  refresh();
}

// ===== D 类多行文本域（无清除按钮，仅字数统计）=====
function setupDField(textareaId, counterId, maxLen) {
  var textarea = document.getElementById(textareaId);
  var counter = document.getElementById(counterId);

  function refresh() {
    var len = textarea.value.length;
    var hasValue = len > 0;
    var overLimit = len > maxLen;

    if (hasValue) {
      counter.textContent = len + '/' + maxLen + '字';
    } else {
      counter.textContent = maxLen + '字';
    }

    if (overLimit) {
      counter.classList.add('error');
    } else {
      counter.classList.remove('error');
    }
  }

  textarea.addEventListener('input', refresh);
  refresh();
}

// ===== 页面导航 =====
function goBack() {
  window.location.href = 'setting-standalone.html';
}

function saveAndGoBack() {
  var name = document.getElementById('agentName').value.trim();
  var desc = document.getElementById('agentDesc').value.trim();
  var prompt = document.getElementById('agentPrompt').value.trim();

  if (name || desc || prompt) {
    localStorage.setItem('agentData', JSON.stringify({ name: name, desc: desc, prompt: prompt }));
  }
  window.location.href = 'setting-standalone.html';
}

// ===== 初始化 =====
(function init() {
  // 恢复已保存数据
  var dataStr = localStorage.getItem('agentData');
  if (dataStr) {
    var d = JSON.parse(dataStr);
    document.getElementById('agentName').value = d.name || '';
    document.getElementById('agentDesc').value = d.desc || '';
    document.getElementById('agentPrompt').value = d.prompt || '';
  }

  // 绑定交互
  setupBField('agentName', 'clearName', 'nameCounter', 20);
  setupBField('agentDesc', 'clearDesc', 'descCounter', 50);
  setupDField('agentPrompt', 'promptCounter', 500);
})();
</script>
